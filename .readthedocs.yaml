# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# This project uses MkDocs (Material) rather than Sphinx.
mkdocs:
  configuration: mkdocs.yml

# Install the package (plus its docs extra) so mkdocstrings can import
# lagranged from src/ and resolve the API reference.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
