name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    name: Lint (ruff + black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff
        run: ruff check src/ tests/

      - name: black
        run: black --check src/ tests/

      - name: mypy
        run: mypy src/lagranged

  test:
    name: pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  docs:
    name: Build docs (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # mkdocstrings analyzes the source statically, so only the [docs] extra is
      # needed (no geo/runtime stack required to build the API reference).
      - name: Install package + docs dependencies
        run: pip install -e ".[docs]"

      - name: Build documentation (warnings are errors)
        run: mkdocs build --strict

  notebooks:
    name: Execute example notebooks (nbmake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The notebooks exercise the geospatial export path, so the [geo] extra is
      # required in addition to [dev] (which provides nbmake).
      - name: Install package + dev + geo extras
        run: pip install -e ".[dev,geo]"

      # Executes every examples/*.ipynb end-to-end so the worked examples can't
      # silently rot as the API evolves.
      - name: Execute notebooks
        run: pytest --nbmake examples/
